<!DOCTYPE html>
<html lang="am">
<head><meta charset="UTF-8"><title>ይግቡ</title></head>
<body>
<h2>የተጠቃሚ መግቢያ</h2>
<form id="loginForm">
  <input type="text" id="username" placeholder="የተጠቃሚ ስም" required><br><br>
  <input type="password" id="password" placeholder="የይለፍ ቃል" required><br><br>
  <button type="submit">ይግቡ</button>
</form>
<pre id="result"></pre>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  });
  const data = await res.json();
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);
});
</script>
</body>
</html>
